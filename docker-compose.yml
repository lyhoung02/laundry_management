version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: laundry-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-laundry}
      MYSQL_USER: ${DB_USER:-laundry_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-laundry_pass}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laundry-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laundry-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5001}:5001"
    environment:
      PORT: 5001
      DB_HOST: db
      DB_USER: ${DB_USER:-laundry_user}
      DB_PASSWORD: ${DB_PASSWORD:-laundry_pass}
      DB_NAME: ${DB_NAME:-laundry}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laundry-network

  # Frontend Next.js App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: laundry-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5001}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      - backend
    networks:
      - laundry-network

networks:
  laundry-network:
    driver: bridge

volumes:
  db_data:
